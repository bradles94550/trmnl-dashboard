<!--
  HA Status widget template for Inker custom widget.
  Configure in Inker: Custom Widget → JSON URL → http://trmnl-aggregator:8081/data/ha
  Map fields to display elements using Inker's template editor.

  This file is a reference — paste the relevant sections into Inker's
  HTML template field when configuring the custom widget.
-->
<div style="font-family: monospace; padding: 12px;">
  <div style="font-size: 18px; font-weight: bold; border-bottom: 2px solid #000; margin-bottom: 8px;">
    🏠 Home Status
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
    <div>
      <div style="font-size: 11px; text-transform: uppercase;">Lights On</div>
      <div style="font-size: 28px; font-weight: bold;">{{ summary.lights_on }}</div>
    </div>
    <div>
      <div style="font-size: 11px; text-transform: uppercase;">Locks</div>
      <div style="font-size: 28px; font-weight: bold;">{{ summary.locks_locked }}</div>
    </div>
    <div>
      <div style="font-size: 11px; text-transform: uppercase;">Doors Open</div>
      <div style="font-size: 28px; font-weight: bold;">{{ summary.doors_open }}</div>
    </div>
    <div>
      <div style="font-size: 11px; text-transform: uppercase;">Alarm</div>
      <div style="font-size: 20px; font-weight: bold;">{{ summary.alarm }}</div>
    </div>
  </div>

  <div style="font-size: 10px; color: #666;">
    Updated: {{ fetched_at }}
  </div>
</div>
