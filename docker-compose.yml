services:
  inker:
    image: wojooo/inker:latest
    container_name: trmnl-inker
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - inker_postgres:/var/lib/postgresql/17/main
      - inker_redis:/data
      - inker_uploads:/app/uploads
    environment:
      TZ: America/Los_Angeles
      ADMIN_PIN: "${INKER_ADMIN_PIN}"
    depends_on:
      - aggregator

  aggregator:
    build: ./aggregator
    container_name: trmnl-aggregator
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      TZ: America/Los_Angeles
      HA_URL: "${HA_URL}"
      HA_TOKEN: "${HA_TOKEN}"
      WEATHER_LAT: "${WEATHER_LAT}"
      WEATHER_LON: "${WEATHER_LON}"
      ESPN_SPORT: "${ESPN_SPORT}"
      ESPN_LEAGUE: "${ESPN_LEAGUE}"
      ESPN_TEAM_ID: "${ESPN_TEAM_ID}"
      ICAL_URL: "${ICAL_URL}"
      CACHE_TTL_WEATHER: "${CACHE_TTL_WEATHER:-1800}"
      CACHE_TTL_SPORTS: "${CACHE_TTL_SPORTS:-1800}"
      CACHE_TTL_CALENDAR: "${CACHE_TTL_CALENDAR:-900}"
      CACHE_TTL_HA: "${CACHE_TTL_HA:-300}"

volumes:
  inker_postgres:
  inker_redis:
  inker_uploads:
