services:
  aggregator:
    build: ./aggregator
    container_name: trmnl-aggregator
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      TZ: America/Los_Angeles
      HA_URL: "${HA_URL}"
      HA_TOKEN: "${HA_TOKEN}"
      WEATHER_LAT: "${WEATHER_LAT}"
      WEATHER_LON: "${WEATHER_LON}"
      ESPN_SPORT: "${ESPN_SPORT}"
      ESPN_LEAGUE: "${ESPN_LEAGUE}"
      ESPN_TEAM_ID: "${ESPN_TEAM_ID}"
      ICAL_URL: "${ICAL_URL}"
      TRMNL_ACCESS_TOKEN: "${TRMNL_ACCESS_TOKEN:-}"
      CACHE_TTL_WEATHER: "${CACHE_TTL_WEATHER:-1800}"
      CACHE_TTL_SPORTS: "${CACHE_TTL_SPORTS:-1800}"
      CACHE_TTL_CALENDAR: "${CACHE_TTL_CALENDAR:-900}"
      CACHE_TTL_HA: "${CACHE_TTL_HA:-300}"
      SERVER_BASE_URL: http://192.168.86.69:8081
